<h5>FERRARIA DO GRANDE GOLPEADOR</h5>
<p class="pblock">Quando Mestra Hurela morreu de insuficiência respiratória aguda há alguns anos, seu filho adotivo, o ogro Grande Golpeador, herdou a ferraria. Ninguém duvida que ele também tenha acontecido sua “mãe” como o melhor ferreiro de Fortaleza.</p>
